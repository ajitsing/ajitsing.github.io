name: Jekyll site deploy

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Fetch AdUnblock script URL
        id: adunblock
        run: |
          URL=$(curl -sf "https://public.adunblocker.com/api/vendor_scripts" | jq -r '.[0] // empty')
          if [ -z "$URL" ]; then
            URL="https://adunblock2.static-cloudflare.workers.dev/index.js"
          fi
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Inject AdUnblock config
        env:
          ADUNBLOCK_CODE: ${{ secrets.ADUNBLOCK_CODE }}
          ADUNBLOCK_SCRIPT_URL: ${{ steps.adunblock.outputs.url }}
        run: |
          echo "adunblock_code: \"$ADUNBLOCK_CODE\"" >> _config.yml
          echo "adunblock_script_url: \"$ADUNBLOCK_SCRIPT_URL\"" >> _config.yml

      - name: Build with Jekyll
        run: bundle exec jekyll build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
