# --- Basic options --- #

# Name of website
title: "Ajit Singh - Software Engineering Blog"

# Short suffix for post title tags (keeps post titles concise in search results)
title-suffix: "Ajit Singh"

# Short description of your site
description: "Software engineering blog by Ajit Singh covering system design, distributed systems, databases, AI, and DevOps. In-depth guides, tutorials, and tools for software engineers."

# Your name to show in the footer
author: Ajit Singh

author-job-title: "Staff Software Engineer"
author-description: "Software engineer with expertise in system design, distributed systems, and developer productivity tools."
author-expertise:
  - "System Design"
  - "Distributed Systems"
  - "Software Architecture"
  - "DevOps"
  - "Mobile Development"
author-employer: "Agoda"
# author-credentials:
#   - name: "AWS Solutions Architect"
#     type: "certification"
#     issuer: "Amazon Web Services"

# Enable speakable schema by default for voice search
speakable_default: true

# --- List of links in the navigation bar --- #

navbar-links:
  About Me: "aboutme"
  Archive: "/archive"
  Explainers: "/explainers/"
  Topics:
    - System Design: "/system-design"
    - AI Engineering: "/ai"
    - Database: "/database"
    - Distributed Systems: "/distributed-systems"
    - Design Patterns: "/design-patterns"
  Tools: "/tools/"
  Tech News: "/software-development-news"

# --- Logo --- #

# Image to show in the navigation bar - works best with a square image
# Remove this parameter if you don't want an image in the navbar
avatar: "/assets/img/avatar.jpg"

# By default, the image is cut into a circle. You can disable this behaviour here.
round-avatar: true

# If you want to have an image logo in the top-left corner instead of the title text,
# then specify the following parameter
#title-img: /path/to/image


# --- Footer options --- #

# Select the social network links that you want to show in the footer.
# Uncomment the links you want to show and add your information to each one.
# If you don't want to show a link to an RSS feed, set rss to "false".
social-network-links:
  email: "jeetsingh.ajit@gmail.com"
#  facebook: deanattali
  github: ajitsing
  twitter: Ajit5ingh
  rss: true
#  reddit: yourname
  linkedin: ajit-singh-11620570
#  xing: yourname
  stackoverflow: "2334534/ajit-singh"
#  snapchat: deanat78
  instagram: Ajit5ingh
  youtube: AjitSinghG
#  spotify: yourname
#  telephone: +14159998888
#  steam: deanat78
#  twitch: yourname
#  yelp: yourname
#  telegram: yourname
#  calendly: yourname

# --- General options --- #

# Select which social network share links to show in posts
share-links-active:
  facebook: true
  threads: true
  whatsapp: true
  linkedin: true
  reddit: true
  twitter: true
  bluesky: true
  mastodon: true
  hackernews: true
  email: true

# How to display the link to your website in the footer
# Remove this if you don't want a link in the footer
url-pretty: "singhajit.com"

# Full URL for SEO and schema
url: "https://singhajit.com"

# Create a "tags" index page and make tags on each post clickable
link-tags: true

# Excerpt Word Length - Truncates the excerpt to the specified number of words on the index page
excerpt_length: 15

# --- Colours / background image --- #

# Personalize the colors in your website. Colour values can be any valid CSS colour

navbar-col: "black"
navbar-text-col: "#FFFFFF"
navbar-border-col: "#EAEAEA"
page-col: "#FFFFFF"
link-col: "#008AFF"
hover-col: "#0085A1"
footer-col: "#F5F5F5"
footer-text-col: "#777777"
footer-link-col: "#404040"

# Alternatively, the navbar, footer, and page background can be set to use background images
# instead of colour

#navbar-img: "/assets/img/bgimage.png"
#footer-img: "/assets/img/bgimage.png"
#page-img: "/assets/img/bgimage.png"

# --- Web Statistics Section --- #

# Google Analytics gtag.js ID
gtag: "G-V1NK1HF18W"

# Microsoft Clarity
clarity: "vxy0o4yb68"

manual_ads: true

# --- Comments --- #

# Utterances (GitHub Issues-backed comments)
utterances:
  repository: "ajitsing/ajitsing.github.io"
  issue-term: pathname
  theme: github-light
  label: blog-comments

# --- Misc --- #

# Character used to separate site title and description in HTML document title
# and RSS feed title
title-separator: "-"

# Ruby Date Format to show dates of posts
date_format: "%B %-d, %Y"


# --- Hub page mapping (category -> hub name and URL) --- #
hub-pages:
  ai: { name: "AI Engineering", url: "/ai/" }
  database: { name: "Database Engineering", url: "/database/" }
  system-design: { name: "System Design", url: "/system-design/" }
  distributed-systems: { name: "Distributed Systems", url: "/distributed-systems/" }
  design-patterns: { name: "Design Patterns", url: "/design-patterns/" }

# --- You don't need to touch anything below here (but you can if you want) --- #

# Output options (more information on Jekyll's site)
timezone: "India/Kolkata"
markdown: kramdown
highlighter: rouge
permalink: /:year-:month-:day-:title/
paginate: 20
future: true

# Collections
collections:
  explainers:
    output: true
    permalink: /explainer/:name/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true

# Default YAML values (more information on Jekyll's site)
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true  # add comments to all blog posts
      social-share: true # add social media sharing buttons to all blog posts
      readtime: true # add estimated reading time on all blog posts
  -
    scope:
      path: ""
      type: "explainers"
    values:
      layout: "explainer"
      comments: false
  -
    scope:
      path: "" # all files
    values:
      layout: "page"
      show-avatar: true

# Exclude these files from production site
exclude:
  - CHANGELOG.md
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - screenshot.png
  - docs/
  - vendor/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from


