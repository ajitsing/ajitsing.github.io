{% if site.manual_ads %}
<style>
  .hero-ad { display: none; width: 100%; background: #f3f4f6; border-bottom: 1px solid #e5e7eb; padding: calc(5rem + 18px) 0 14px; contain: layout; }
  .hero-ad__inner { width: 970px; height: 250px; margin: 0 auto; }
  .hero-ad__unit { display: block; width: 970px; height: 250px; }
  @media (min-width: 992px) {
    .hero-ad { display: block; }
    .hero-ad + .header-section .intro-header { margin-top: 1.25rem; }
  }
  @media (min-width: 1200px) {
    .hero-ad { padding-top: calc(8.125rem + 18px); }
  }
</style>
<aside class="hero-ad" aria-label="Advertisement">
  <div class="hero-ad__inner">
    <ins class="adsbygoogle hero-ad__unit"
         style="display:inline-block;width:970px;height:250px"
         data-ad-client="ca-pub-2886086145980317"
         data-ad-slot="1787846424"></ins>
  </div>
  <script>
    (function () {
      if (!window.matchMedia || !window.matchMedia('(min-width: 992px)').matches) return;
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') return;
      if (!window.__adsbyLoaded) {
        window.__adsbyLoaded = true;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2886086145980317';
        s.crossOrigin = 'anonymous';
        document.head.appendChild(s);
      }
      (window.adsbygoogle = window.adsbygoogle || []).push({});
    })();
  </script>
</aside>
{% endif %}
