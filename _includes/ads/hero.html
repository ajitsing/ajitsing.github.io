{% if site.manual_ads %}
<style>
  .hero-banner {
    display: none;
    width: 100%;
    padding: calc(5rem + 18px) 0 18px;
    border-bottom: 1px solid #e2e8f0;
    background-color: #eef2f7;
    background-image:
      url('{{ "/assets/img/hero-network-bg.svg" | relative_url }}'),
      linear-gradient(135deg, #f8fafc 0%, #eef2f7 55%, #e7ecf3 100%);
    background-repeat: no-repeat, no-repeat;
    background-position: center center, center center;
    background-size: cover, cover;
    contain: layout;
  }
  .hero-banner__inner {
    width: 970px;
    margin: 0 auto;
  }
  .hero-banner__card {
    width: 970px;
    height: 250px;
    margin: 0 auto;
    background: transparent;
    border-radius: 10px;
    box-shadow: none;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 200ms ease, box-shadow 200ms ease;
  }
  /* Only frame the slot once AdSense reports a real creative was served. */
  .hero-banner__card:has(ins[data-ad-status="filled"]) {
    background: #ffffff;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04), 0 6px 18px rgba(15, 23, 42, 0.06);
  }
  .hero-banner__unit {
    display: block;
    width: 970px;
    height: 250px;
  }
  @media (min-width: 992px) {
    .hero-banner { display: block; }
    .hero-banner + .header-section .intro-header { margin-top: 1.25rem; }
  }
  @media (min-width: 1200px) {
    .hero-banner { padding-top: calc(8.125rem + 18px); }
  }
</style>
<aside class="hero-banner" aria-label="Sponsored placement">
  <div class="hero-banner__inner">
    <div class="hero-banner__card">
      <ins class="adsbygoogle hero-banner__unit"
           style="display:block;width:970px;height:250px"
           data-ad-client="ca-pub-2886086145980317"
           data-ad-slot="1787846424"
           data-ad-format="horizontal"
           data-full-width-responsive="false"></ins>
    </div>
  </div>
  <script>
    (function () {
      if (!window.matchMedia || !window.matchMedia('(min-width: 992px)').matches) return;
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') return;
      if (!window.__adsbyLoaded) {
        window.__adsbyLoaded = true;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2886086145980317';
        s.crossOrigin = 'anonymous';
        document.head.appendChild(s);
      }
      (window.adsbygoogle = window.adsbygoogle || []).push({});
    })();
  </script>
</aside>
{% endif %}
