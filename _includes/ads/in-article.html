{% if site.manual_ads %}
<div class="post-mid-ad">
  <ins class="adsbygoogle"
       style="display:block; text-align:center;"
       data-ad-layout="in-article"
       data-ad-format="fluid"
       data-ad-client="ca-pub-2886086145980317"
       data-ad-slot="4015567555"></ins>
  <script>
  (function() {
    var wrap = document.currentScript.parentNode;
    var ins = wrap.querySelector('ins.adsbygoogle');
    if (!ins) return;
    var requested = false, fallbackDone = false;

    function requestAd() {
      if (requested) return;
      if (!(wrap.offsetWidth > 0)) { ins.remove(); return; }
      requested = true;
      try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
      var obs = new MutationObserver(function() {
        var status = ins.getAttribute('data-ad-status');
        if (status === 'filled') { obs.disconnect(); }
        else if (status === 'unfilled') { obs.disconnect(); showFallback(); }
      });
      obs.observe(ins, { attributes: true, attributeFilter: ['data-ad-status'] });
    }

    // Backfill the native no-fill with a responsive display unit.
    function showFallback() {
      if (fallbackDone) return;
      fallbackDone = true;
      ins.remove();
      var fb = document.createElement('ins');
      fb.className = 'adsbygoogle';
      fb.style.display = 'block';
      fb.setAttribute('data-ad-client', 'ca-pub-2886086145980317');
      fb.setAttribute('data-ad-slot', '5138071441');
      fb.setAttribute('data-ad-format', 'auto');
      fb.setAttribute('data-full-width-responsive', 'true');
      wrap.appendChild(fb);
      try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
    }

    // Lazy-load: only request as the slot approaches the viewport.
    if ('IntersectionObserver' in window) {
      var io = new IntersectionObserver(function(entries) {
        if (entries[0].isIntersecting) { io.disconnect(); requestAd(); }
      }, { rootMargin: '600px 0px' });
      io.observe(wrap);
    } else {
      requestAd();
    }
  })();
  </script>
</div>
{% endif %}
