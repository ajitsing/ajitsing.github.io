{% if site.manual_ads %}
<style>
  .tool-top-ad {
    margin: 24px 0 36px;
    padding: 0 4px;
    text-align: center;
    min-height: 200px;
    contain: layout;
    position: relative;
  }
  .tool-top-ad .adsbygoogle {
    width: 100%;
    display: block;
    min-height: 200px;
  }
  .tool-top-ad__fallback {
    display: none;
    text-align: left;
    min-height: 200px;
  }
  .tool-top-ad__fallback[data-show="1"] {
    display: block;
  }
  .tool-post-alert {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 200px;
    height: 200px;
    box-sizing: border-box;
    max-width: 100%;
    background: linear-gradient(135deg, #f0f7fa 0%, #e8f2f6 100%);
    border: 1px solid #a8c8d8;
    border-left: 4px solid #0085a1;
    border-radius: 10px;
    padding: 0.7rem 0.9rem;
    box-shadow: 0 2px 8px rgba(0, 133, 161, 0.1);
    overflow: hidden;
  }
  .tool-post-alert-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    margin-bottom: 0.45rem;
    flex-shrink: 0;
  }
  .tool-post-alert-label {
    font-size: 0.62rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #0085a1;
  }
  .tool-post-alert-date {
    font-size: 0.72rem;
    color: #5a8fa3;
  }
  .tool-post-alert-content {
    display: flex;
    align-items: flex-start;
    gap: 0.65rem;
    flex: 1;
    min-height: 0;
  }
  .tool-post-alert-thumb {
    flex-shrink: 0;
    display: block;
    width: 96px;
    height: 64px;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #c5dce6;
  }
  .tool-post-alert-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .tool-post-alert-copy {
    flex: 1;
    min-width: 0;
  }
  .tool-post-alert-title {
    font-size: 0.9rem;
    font-weight: 700;
    color: #292524 !important;
    text-decoration: none !important;
    line-height: 1.25;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 0.2rem;
  }
  .tool-post-alert-title:hover {
    color: #44403c !important;
    text-decoration: underline !important;
  }
  .tool-post-alert-subtitle {
    margin: 0;
    font-size: 0.78rem;
    font-weight: 500;
    color: #57534e;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .tool-post-alert-site-title {
    margin: 0 0 0.25rem;
    font-size: 0.9rem;
    font-weight: 700;
    color: #292524;
    line-height: 1.25;
  }
  .tool-post-alert-cta {
    flex-shrink: 0;
    align-self: center;
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.4rem 0.65rem;
    font-size: 0.72rem;
    font-weight: 700;
    color: #fff !important;
    background: #292524;
    border-radius: 6px;
    text-decoration: none !important;
    transition: background 0.2s ease;
    white-space: nowrap;
  }
  .tool-post-alert-cta:hover {
    background: #44403c;
    color: #fff !important;
  }
  .tool-post-alert-links {
    margin: 0.5rem 0 0;
    padding-top: 0.45rem;
    border-top: 1px solid #c5dce6;
    font-size: 0.75rem;
    flex-shrink: 0;
  }
  .tool-post-alert-links a {
    color: #006d8a !important;
    text-decoration: none !important;
    font-weight: 600;
  }
  .tool-post-alert-links a:hover {
    color: #0085a1 !important;
    text-decoration: underline !important;
  }
  .tool-post-alert-links span {
    margin: 0 0.3rem;
    color: #d6d3d1;
  }
  @media (max-width: 768px) {
    .tool-top-ad {
      margin: 20px 0 28px;
    }
    .tool-post-alert {
      height: auto;
      min-height: 200px;
      padding: 0.65rem 0.8rem;
    }
    .tool-post-alert-content {
      flex-wrap: wrap;
    }
    .tool-post-alert-cta {
      width: 100%;
      justify-content: center;
      margin-top: 0.35rem;
      align-self: stretch;
    }
    .tool-post-alert-thumb {
      width: 80px;
      height: 54px;
    }
    .tool-post-alert-title {
      font-size: 0.85rem;
    }
  }
</style>
<div class="tool-top-ad">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-2886086145980317"
       data-ad-slot="2413953100"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
  (function() {
    var wrap = document.currentScript.closest('.tool-top-ad');
    if (wrap && wrap.offsetWidth > 0) {
      try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
    } else if (wrap) {
      var ins = wrap.querySelector('ins.adsbygoogle');
      if (ins) ins.remove();
    }
  })();
  </script>
  <div class="tool-top-ad__fallback" aria-label="From the blog">
    {% include tool-post-alert.html %}
  </div>
  <script>
  (function() {
    var wrap = document.currentScript.closest('.tool-top-ad');
    var ins = wrap.querySelector('ins.adsbygoogle');
    var done = false;

    function showFallback() {
      if (done) return;
      done = true;
      var fb = wrap.querySelector('.tool-top-ad__fallback');
      if (fb) fb.setAttribute('data-show', '1');
      if (ins) ins.style.display = 'none';
      if (typeof gtag === 'function') {
        gtag('event', 'tool_banner_fallback_shown', {
          event_category: 'House Ad',
          non_interaction: true
        });
      }
    }

    if (!ins) { showFallback(); return; }

    function check() {
      if (done) return;
      var status = ins.getAttribute('data-ad-status');
      if (status === 'filled' || ins.querySelector('iframe')) { done = true; return; }
      if (status === 'unfilled') { showFallback(); return; }
    }

    new MutationObserver(check).observe(ins, {
      attributes: true, attributeFilter: ['data-ad-status']
    });
    check();

    // Safety net: if AdSense never reports a status (e.g. script blocked), fall back.
    setTimeout(function() {
      if (!done && ins.getAttribute('data-ad-status') !== 'filled' && !ins.querySelector('iframe')) {
        showFallback();
      }
    }, 8000);
  })();
  </script>
</div>
{% endif %}
