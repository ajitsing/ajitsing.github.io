{% if page.layout == "glossary-term" %}
{% assign hub_url = site.url | append: "/glossary/" %}
{% assign plain_definition = page.definition | markdownify | strip_html | strip_newlines | strip %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "DefinedTerm",
      "@id": "{{ page.url | absolute_url }}#term",
      "name": "{{ page.title | escape }}",
      {% if page.also-known-as %}
      "alternateName": [{% for alt in page.also-known-as %}"{{ alt | escape }}"{% unless forloop.last %}, {% endunless %}{% endfor %}],
      {% endif %}
      "description": {{ plain_definition | jsonify }},
      "url": "{{ page.url | absolute_url }}",
      "inDefinedTermSet": {
        "@type": "DefinedTermSet",
        "@id": "{{ hub_url }}#dictionary",
        "name": "Software Engineering Glossary",
        "url": "{{ hub_url }}"
      }
      {% if page.category %},
      "termCode": "{{ page.category | escape }}"
      {% endif %}
    },
    {
      "@type": "BreadcrumbList",
      "@id": "{{ page.url | absolute_url }}#breadcrumb",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "{{ site.url }}"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Glossary",
          "item": "{{ hub_url }}"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": "{{ page.title | escape }}",
          "item": "{{ page.url | absolute_url }}"
        }
      ]
    },
    {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}#webpage",
      "url": "{{ page.url | absolute_url }}",
      "name": "{{ page.title | escape }}",
      "description": {{ plain_definition | jsonify }},
      "isPartOf": { "@id": "{{ site.url }}#website" },
      "inLanguage": "en-US",
      "datePublished": "{% if page.date %}{{ page.date | date_to_xmlschema }}{% else %}{{ site.time | date_to_xmlschema }}{% endif %}",
      "dateModified": "{% if page.last-modified-date %}{{ page.last-modified-date | date_to_xmlschema }}{% else %}{{ site.time | date_to_xmlschema }}{% endif %}",
      "author": { "@id": "{{ site.url }}#author" },
      "publisher": { "@id": "{{ site.url }}#organization" },
      "breadcrumb": { "@id": "{{ page.url | absolute_url }}#breadcrumb" }{% if page.speakable or site.speakable_default %},
      "speakable": {
        "@type": "SpeakableSpecification",
        "cssSelector": [
          ".glossary-title",
          ".glossary-definition-card p",
          ".glossary-takeaways li"
        ]
      }{% endif %}
    },
    {
      "@type": "Person",
      "@id": "{{ site.url }}#author",
      "name": "{{ site.author }}",
      "url": "{{ site.url }}/aboutme",
      {% if site.author-job-title %}
      "jobTitle": "{{ site.author-job-title }}",
      {% endif %}
      {% if site.author-description %}
      "description": "{{ site.author-description }}",
      {% endif %}
      {% if site.author-expertise %}
      "knowsAbout": [{% for area in site.author-expertise %}"{{ area }}"{% unless forloop.last %}, {% endunless %}{% endfor %}],
      {% endif %}
      {% if site.author-employer %}
      "worksFor": {
        "@type": "Organization",
        "name": "{{ site.author-employer }}"
      },
      {% endif %}
      "sameAs": [
        {% if site.social-network-links.twitter %}"https://twitter.com/{{ site.social-network-links.twitter }}"{% endif %}{% if site.social-network-links.github %},
        "https://github.com/{{ site.social-network-links.github }}"{% endif %}{% if site.social-network-links.linkedin %},
        "https://www.linkedin.com/in/{{ site.social-network-links.linkedin }}"{% endif %}{% if site.social-network-links.youtube %},
        "https://www.youtube.com/{{ site.social-network-links.youtube }}"{% endif %}
      ]
    },
    {
      "@type": "Organization",
      "@id": "{{ site.url }}#organization",
      "name": "{{ site.title }}",
      "url": "{{ site.url }}",
      {% if site.avatar or site.seo-image %}
      "logo": {
        "@type": "ImageObject",
        "url": "{{ site.avatar | default: site.seo-image | absolute_url }}",
        "width": 400,
        "height": 400
      },
      {% endif %}
      "founder": { "@id": "{{ site.url }}#author" }
    },
    {
      "@type": "WebSite",
      "@id": "{{ site.url }}#website",
      "url": "{{ site.url }}",
      "name": "{{ site.title }}",
      "description": "{{ site.description }}",
      "publisher": { "@id": "{{ site.url }}#organization" },
      "inLanguage": "en-US"
    }
  ]
}
</script>
{% endif %}
