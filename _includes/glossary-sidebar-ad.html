{% if site.manual_ads %}
<div class="glossary-sidebar-widget glossary-sidebar-ad">
  <span class="ad-label"><span class="ad-label-text">Advertisement</span></span>
  <div class="sidebar-sticky-ad" data-ad-refresh="30">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-2886086145980317"
         data-ad-slot="1252195463"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
    (function() {
      var container = document.currentScript.closest('.glossary-sidebar-ad');
      if (container && container.offsetWidth > 0) {
        try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch (e) {}
      } else if (container) {
        var ins = container.querySelector('.adsbygoogle');
        if (ins) ins.remove();
      }
    })();
    </script>
    <script defer src="{{ '/assets/js/sidebar-ad-refresh.js' | relative_url }}"></script>
  </div>
</div>
{% endif %}
