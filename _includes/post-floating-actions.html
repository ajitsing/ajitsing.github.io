{% capture encoded_title %}{{ page.title | replace: ' ', '%20' | replace: ':', '%3A' | replace: ',', '%2C' | replace: '&', '%26' | replace: "'", '%27' | replace: '"', '%22' }}{% endcapture %}
{% capture encoded_url %}{{ page.url | absolute_url | url_encode }}{% endcapture %}

<link rel="stylesheet" href="https://unpkg.com/applause-button/dist/applause-button.css" />
<script src="https://unpkg.com/applause-button/dist/applause-button.js"></script>

<div class="floating-actions" id="floating-actions">
  <div class="floating-actions-clap">
    <applause-button style="width: 48px; height: 48px;" multiclap="true" color="#0085A1"
      url="{{ page.url | absolute_url }}" />
  </div>

  <div class="floating-actions-divider"></div>

  <a class="floating-share-btn" href="https://twitter.com/intent/tweet?text={{ encoded_title }}&url={{ encoded_url }}"
     target="_blank" rel="noopener noreferrer" title="Share on X"
     onclick="gtag('event', 'share', {'method': 'X', 'content_type': 'article', 'item_id': '{{ page.url }}'});">
    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
    </svg>
  </a>

  <a class="floating-share-btn" href="https://www.linkedin.com/sharing/share-offsite/?url={{ encoded_url }}"
     target="_blank" rel="noopener noreferrer" title="Share on LinkedIn"
     onclick="gtag('event', 'share', {'method': 'LinkedIn', 'content_type': 'article', 'item_id': '{{ page.url }}'});">
    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
      <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
    </svg>
  </a>

  <a class="floating-share-btn" href="https://news.ycombinator.com/submitlink?u={{ encoded_url }}&t={{ encoded_title }}"
     target="_blank" rel="noopener noreferrer" title="Share on Hacker News"
     onclick="gtag('event', 'share', {'method': 'Hacker News', 'content_type': 'article', 'item_id': '{{ page.url }}'});">
    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
      <path d="M0 0v24h24V0H0zm12.8 13.4v5.3h-1.6v-5.3L7.3 5.3h1.8l2.9 5.8 2.9-5.8h1.8l-3.9 8.1z"/>
    </svg>
  </a>

  <a class="floating-share-btn" href="https://www.threads.net/intent/post?text={{ encoded_title }}%20{{ encoded_url }}"
     target="_blank" rel="noopener noreferrer" title="Share on Threads"
     onclick="gtag('event', 'share', {'method': 'Threads', 'content_type': 'article', 'item_id': '{{ page.url }}'});">
    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
      <path d="M12.186 24h-.007c-3.581-.024-6.334-1.205-8.184-3.509C2.35 18.44 1.5 15.586 1.472 12.01v-.017c.03-3.579.879-6.43 2.525-8.482C5.845 1.205 8.6.024 12.18 0h.014c2.746.02 5.043.725 6.826 2.098 1.677 1.29 2.858 3.13 3.509 5.467l-2.04.569c-1.104-3.96-3.898-5.984-8.304-6.015-2.91.022-5.11.936-6.54 2.717C4.307 6.504 3.616 8.914 3.589 12c.027 3.086.718 5.496 2.057 7.164 1.43 1.783 3.631 2.698 6.54 2.717 2.623-.02 4.358-.631 5.8-2.045 1.647-1.613 1.618-3.593 1.09-4.798-.31-.71-.873-1.3-1.634-1.75-.192 1.352-.622 2.446-1.284 3.272-.886 1.102-2.14 1.704-3.73 1.79-1.202.065-2.361-.218-3.259-.801-1.063-.689-1.685-1.74-1.752-2.96-.065-1.182.408-2.256 1.332-3.023.88-.73 2.088-1.146 3.6-1.242 1.02-.064 1.968-.034 2.86.033-.034-.79-.282-1.388-.74-1.79-.533-.467-1.32-.706-2.34-.711h-.022c-.822.006-1.972.18-2.703.858l-1.39-1.53c1.092-.992 2.59-1.373 3.403-1.428h.036c1.53.012 2.739.434 3.594 1.255.796.764 1.243 1.818 1.33 3.136.403.063.79.142 1.158.239 1.117.295 2.076.752 2.851 1.359.897.702 1.55 1.593 1.94 2.65.78 2.117.612 4.878-1.453 6.897-1.858 1.815-4.226 2.6-7.473 2.623zm-.09-7.964c-.868.052-1.53.274-1.972.662-.422.37-.634.834-.6 1.306.035.472.334.897.843 1.196.545.32 1.258.477 2.007.436 1.105-.06 1.937-.465 2.476-1.204.322-.44.55-.985.685-1.636-.64-.089-1.322-.143-2.041-.143-.469 0-.936.024-1.398.073v-.69z"/>
    </svg>
  </a>
</div>

<style>
.floating-actions {
  position: fixed;
  z-index: 999;
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 12px 8px;
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 28px;
  box-shadow: 0 1px 8px rgba(0, 0, 0, 0.06);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.floating-actions.visible {
  opacity: 1;
  pointer-events: auto;
}

.floating-actions-clap {
  display: flex;
  align-items: center;
  justify-content: center;
}

.floating-actions-clap applause-button {
  font-size: 12px;
}

.floating-actions-divider {
  width: 28px;
  height: 1px;
  background: #e5e7eb;
  margin: 4px 0;
}

.floating-share-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  color: #6b7280;
  text-decoration: none;
  transition: background 0.2s ease, color 0.2s ease;
}

.floating-share-btn:hover {
  background: #f3f4f6;
  color: #111827;
  text-decoration: none;
}

.floating-share-btn svg {
  flex-shrink: 0;
}

/* Only show on desktop */
@media (min-width: 1200px) {
  .floating-actions {
    display: flex;
    top: 50%;
    transform: translateY(-50%);
    left: calc((100vw - 1000px) / 2 - 120px);
  }
}

@media (min-width: 1400px) {
  .floating-actions {
    left: calc((100vw - 1150px) / 2 - 120px);
  }
}

</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var toolbar = document.getElementById('floating-actions');
  var article = document.querySelector('article.blog-post');
  if (!toolbar || !article) return;

  var visible = false;

  function update() {
    var rect = article.getBoundingClientRect();
    var show = rect.top < window.innerHeight * 0.6 && rect.bottom > window.innerHeight * 0.3;

    if (show !== visible) {
      visible = show;
      toolbar.classList.toggle('visible', show);
    }
  }

  var ticking = false;
  window.addEventListener('scroll', function() {
    if (!ticking) {
      requestAnimationFrame(function() {
        update();
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });

  update();
});
</script>
