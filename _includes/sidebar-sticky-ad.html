{% if site.manual_ads %}
<div class="sidebar-sticky-ad">
  <div class="ad-label"><span class="ad-label-text">Advertisement</span></div>
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-2886086145980317"
       data-ad-slot="1353070800"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
  (adsbygoogle = window.adsbygoogle || []).push({});
  (function() {
    var container = document.currentScript.closest('.sidebar-sticky-ad');
    var ins = container && container.querySelector('.adsbygoogle');
    if (!ins) return;
    function check() {
      var s = ins.getAttribute('data-ad-status');
      if (s === 'unfilled') container.classList.add('ad-unfilled');
      else if (s === 'filled') container.classList.remove('ad-unfilled');
    }
    check();
    new MutationObserver(check).observe(ins, { attributes: true, attributeFilter: ['data-ad-status'] });
  })();
  </script>
</div>
{% endif %}
