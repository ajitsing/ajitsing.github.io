{% if site.manual_ads %}
<aside class="tool-ad-sidebar">
  <div class="sidebar-sticky-ad" data-ad-refresh="30">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-2886086145980317"
         data-ad-slot="6282528500"
         data-ad-format="vertical"></ins>
    <script>
    (function() {
      var container = document.currentScript.closest('.tool-ad-sidebar');
      if (container && container.offsetWidth > 0) {
        try{(adsbygoogle = window.adsbygoogle || []).push({});}catch(e){}
      } else if (container) {
        var ins = container.querySelector('.adsbygoogle');
        if (ins) ins.remove();
      }
    })();
    </script>
    <script defer src="{{ '/assets/js/sidebar-ad-refresh.js' | relative_url }}"></script>
  </div>
</aside>
{% endif %}
