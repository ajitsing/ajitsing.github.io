<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Decorative distributed network background">
  <defs>
    <linearGradient id="hb-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="55%" stop-color="#eef2f7"/>
      <stop offset="100%" stop-color="#e7ecf3"/>
    </linearGradient>
    <radialGradient id="hb-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#6366f1" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="250" fill="url(#hb-bg)"/>

  <g stroke="#94a3b8" stroke-opacity="0.22" stroke-width="1" stroke-linecap="round" fill="none">
    <line x1="60"  y1="70"  x2="180" y2="30"/>
    <line x1="60"  y1="70"  x2="210" y2="100"/>
    <line x1="60"  y1="70"  x2="40"  y2="200"/>
    <line x1="140" y1="180" x2="210" y2="100"/>
    <line x1="140" y1="180" x2="290" y2="200"/>
    <line x1="140" y1="180" x2="40"  y2="200"/>
    <line x1="210" y1="100" x2="340" y2="60"/>
    <line x1="210" y1="100" x2="180" y2="30"/>
    <line x1="290" y1="200" x2="410" y2="150"/>
    <line x1="290" y1="200" x2="380" y2="220"/>
    <line x1="340" y1="60"  x2="410" y2="150"/>
    <line x1="340" y1="60"  x2="480" y2="50"/>
    <line x1="410" y1="150" x2="380" y2="220"/>
    <line x1="480" y1="50"  x2="590" y2="110"/>
    <line x1="480" y1="50"  x2="620" y2="40"/>
    <line x1="520" y1="220" x2="650" y2="200"/>
    <line x1="520" y1="220" x2="380" y2="220"/>
    <line x1="590" y1="110" x2="720" y2="60"/>
    <line x1="590" y1="110" x2="620" y2="40"/>
    <line x1="650" y1="200" x2="780" y2="170"/>
    <line x1="720" y1="60"  x2="850" y2="100"/>
    <line x1="780" y1="170" x2="850" y2="100"/>
    <line x1="780" y1="170" x2="910" y2="220"/>
    <line x1="850" y1="100" x2="970" y2="50"/>
    <line x1="910" y1="220" x2="1030" y2="160"/>
    <line x1="970" y1="50"  x2="1100" y2="90"/>
    <line x1="1030" y1="160" x2="1100" y2="90"/>
    <line x1="1030" y1="160" x2="1150" y2="210"/>
    <line x1="1100" y1="90"  x2="1150" y2="210"/>
  </g>

  <g fill="url(#hb-halo)">
    <circle cx="340" cy="60"  r="22"/>
    <circle cx="590" cy="110" r="22"/>
    <circle cx="850" cy="100" r="22"/>
    <circle cx="1100" cy="90" r="22"/>
  </g>

  <g fill="#64748b" fill-opacity="0.35">
    <circle cx="60"   cy="70"  r="2.5"/>
    <circle cx="140"  cy="180" r="2.5"/>
    <circle cx="210"  cy="100" r="2.5"/>
    <circle cx="290"  cy="200" r="2.5"/>
    <circle cx="410"  cy="150" r="2.5"/>
    <circle cx="480"  cy="50"  r="2.5"/>
    <circle cx="520"  cy="220" r="2.5"/>
    <circle cx="650"  cy="200" r="2.5"/>
    <circle cx="720"  cy="60"  r="2.5"/>
    <circle cx="780"  cy="170" r="2.5"/>
    <circle cx="910"  cy="220" r="2.5"/>
    <circle cx="970"  cy="50"  r="2.5"/>
    <circle cx="1030" cy="160" r="2.5"/>
    <circle cx="1150" cy="210" r="2.5"/>
    <circle cx="40"   cy="200" r="2.5"/>
    <circle cx="180"  cy="30"  r="2.5"/>
    <circle cx="380"  cy="220" r="2.5"/>
    <circle cx="620"  cy="40"  r="2.5"/>
  </g>

  <g fill="#6366f1" fill-opacity="0.7">
    <circle cx="340"  cy="60"  r="3.2"/>
    <circle cx="590"  cy="110" r="3.2"/>
    <circle cx="850"  cy="100" r="3.2"/>
    <circle cx="1100" cy="90"  r="3.2"/>
  </g>
</svg>
